name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Poetry
        run: |
          pip install poetry==2.3.2
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Verify lock file
        run: poetry check --lock

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest --tb=short -q

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Placeholder values — next build needs these present but they don't need to be valid.
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (type-check + bundle)
        run: npm run build

  build-agent-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Windows App SDK workload
        run: dotnet workload install windowsdesktop

      - name: Build Setup Assistant
        run: dotnet build setup-assistant-windows/DJToolkitSetup/DJToolkitSetup.csproj -c Release -r win-x64 -p:Platform=x64

  build-agent-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI config
        run: cp setup-assistant/Config.xcconfig.ci setup-assistant/Config.xcconfig

      - name: Build Setup Assistant
        run: xcodebuild -project setup-assistant/DJToolkitSetup.xcodeproj -scheme DJToolkitSetup -configuration Release build CODE_SIGNING_ALLOWED=NO
