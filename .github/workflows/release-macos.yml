name: Release — macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.12)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build-macos:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install chromaprint (fpcalc)
        run: brew install chromaprint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv run pip install pyinstaller

      # Re-sign all native binaries with ad-hoc signatures before PyInstaller bundles them.
      # actions/setup-python's Python.framework carries python.org's Team ID (4P42Z2F3DC).
      # macOS 15+ enforces that dlopen-ed libraries share the same Team ID as the process.
      # Our PyInstaller onefile is ad-hoc signed (no Team ID), so ALL embedded native
      # binaries must also be ad-hoc signed. We re-sign both the Python framework and
      # venv site-packages (cryptography, cffi, etc.) using --force --sign - (NOT
      # --remove-signature, which can corrupt __LINKEDIT).
      - name: Re-sign all native binaries with ad-hoc before bundling
        run: |
          set -euo pipefail

          # Locate Python.framework
          PYPREFIX=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('PYTHONFRAMEWORKPREFIX') or '')")
          PYFRAMEWORK="$PYPREFIX/Python.framework"
          # Venv site-packages
          VENV_SITE=$(.venv/bin/python -c "import site; print(site.getsitepackages()[0])")

          echo "Python.framework: $PYFRAMEWORK"
          echo "Venv site-packages: $VENV_SITE"

          SIGNED=0
          FAILED=0
          FAIL_LIST=$(mktemp)

          for dir in "$PYFRAMEWORK" "$VENV_SITE"; do
            if [ ! -d "$dir" ]; then
              echo "SKIP: $dir does not exist"
              continue
            fi
            echo "--- Signing binaries under: $dir ---"
            while IFS= read -r -d '' f; do
              if codesign --force --sign - "$f" 2>&1; then
                echo "  [OK] $f"
                SIGNED=$((SIGNED + 1))
              else
                echo "  [FAIL] $f"
                echo "$f" >> "$FAIL_LIST"
                FAILED=$((FAILED + 1))
              fi
            done < <(find "$dir" -type f \( -name "*.dylib" -o -name "*.so" -o -name "Python" \) -print0)
          done

          echo ""
          echo "=== Re-signing summary: $SIGNED signed, $FAILED failed ==="

          if [ "$FAILED" -gt 0 ]; then
            echo "Failed files:"
            cat "$FAIL_LIST"
            rm -f "$FAIL_LIST"
            exit 1
          fi
          rm -f "$FAIL_LIST"

          # Verify the framework's libpython and Python binary
          for name in "libpython3*.dylib" "Python"; do
            LIB=$(find "$PYFRAMEWORK" -name "$name" -print -quit 2>/dev/null)
            if [ -n "$LIB" ]; then
              echo ""
              echo "=== Verifying: $LIB ==="
              codesign -dvv "$LIB" 2>&1 || true
              TEAM_ID=$(codesign -dvv "$LIB" 2>&1 | grep 'TeamIdentifier=' | cut -d= -f2)
              if [ "$TEAM_ID" != "not set" ]; then
                echo "ERROR: $LIB still has TeamIdentifier=$TEAM_ID after re-signing"
                exit 1
              fi
              echo "TeamIdentifier=not set — OK"
            fi
          done

      - name: Build installer
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          # Strip leading 'v' from tag for VERSION
          export VERSION="${VERSION#v}"
          bash packaging/macos/build.sh

      # Smoke-test the built binary before packaging.
      # If Python fails to load (Team ID mismatch, missing dylib, etc.) the
      # bootloader exits non-zero here and CI fails before a broken DMG is released.
      - name: Smoke-test built binary
        run: |
          echo "=== djtoolkit --help (verifies Python loads and CLI boots) ==="
          ./dist/djtoolkit --help

          echo ""
          echo "=== DYLD library load diagnostics ==="
          DYLD_PRINT_LIBRARIES=1 ./dist/djtoolkit --help 2>&1 | head -50 || true

      - name: Create Homebrew tarball
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          VERSION="${VERSION#v}"
          TAR_NAME="djtoolkit-${VERSION}-arm64.tar.gz"
          tar czf "${TAR_NAME}" -C dist djtoolkit
          echo "TAR_NAME=${TAR_NAME}" >> "$GITHUB_ENV"
          echo "Created: ${TAR_NAME} ($(du -sh "${TAR_NAME}" | cut -f1))"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          draft: false
          files: |
            *.dmg
            ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release tarballs
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${VERSION#v}"
          gh release download "${{ env.RELEASE_VERSION }}" \
            --pattern "djtoolkit-${VERSION}-arm64.tar.gz"

      - name: Generate formula
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum "djtoolkit-${VERSION}-arm64.tar.gz" | cut -d' ' -f1)

          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_ARM64__/${SHA_ARM64}/g" \
            homebrew/Formula/djtoolkit.rb > djtoolkit.rb

          echo "--- Generated formula ---"
          cat djtoolkit.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yenkz/homebrew-djtoolkit.git" tap
          mkdir -p tap/Formula
          cp djtoolkit.rb tap/Formula/djtoolkit.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/djtoolkit.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update djtoolkit to ${{ env.RELEASE_VERSION }}"
          git push
