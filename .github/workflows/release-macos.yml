name: Release — macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.12)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build-macos:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install chromaprint (fpcalc)
        run: brew install chromaprint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv run pip install pyinstaller

      # Strip the Python.framework signature BEFORE PyInstaller embeds it.
      # actions/setup-python's Python.framework is signed with python.org's Team ID.
      # PyInstaller packages it inside the onefile binary. At runtime the bootloader
      # extracts it and calls dlopen — macOS rejects the load because the ad-hoc-signed
      # djtoolkit binary has no Team ID while the framework does ("different Team IDs").
      # Stripping the signature makes the framework compatible with ad-hoc signing.
      - name: Strip Python.framework signature before bundling
        run: |
          PYLIB=$(python3 -c "import sysconfig,os; fw=sysconfig.get_config_var('PYTHONFRAMEWORKPREFIX') or ''; ver=sysconfig.get_python_version(); print(os.path.join(fw,'Python.framework','Versions',ver,'Python'))")
          echo "Python dylib: $PYLIB"
          if [ -f "$PYLIB" ]; then
            codesign --remove-signature "$PYLIB"
            echo "Signature stripped."
          else
            PYLIB2=$(python3 -c "import sys,os; print(os.path.join(sys.prefix,'Python'))")
            echo "sysconfig miss — fallback: $PYLIB2"
            if [ -f "$PYLIB2" ]; then
              codesign --remove-signature "$PYLIB2"
              echo "Stripped (fallback)."
            else
              echo "WARNING: could not locate Python dylib"
            fi
          fi

      - name: Build Setup Assistant
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Write Config.xcconfig from secret (or fall back to CI placeholder)
          # xcconfig treats // as comment-start, so escape https:// → https:/$()/
          if [ -n "$SUPABASE_URL" ]; then
            ESCAPED_URL=$(echo "$SUPABASE_URL" | sed 's|https://|https:/$()/|')
            echo "SUPABASE_URL = ${ESCAPED_URL}" > setup-assistant/Config.xcconfig
          else
            cp setup-assistant/Config.xcconfig.ci setup-assistant/Config.xcconfig
          fi
          xcodebuild -project setup-assistant/DJToolkitSetup.xcodeproj \
            -scheme DJToolkitSetup \
            -configuration Release \
            -archivePath build/DJToolkitSetup.xcarchive \
            archive -quiet
          xcodebuild -exportArchive \
            -archivePath build/DJToolkitSetup.xcarchive \
            -exportOptionsPlist setup-assistant/ExportOptions.plist \
            -exportPath build/ -quiet
          cp -R "build/DJToolkit Setup.app" dist/
          echo "✓ Setup Assistant built"

      - name: Build installer
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          # Strip leading 'v' from tag for VERSION
          export VERSION="${VERSION#v}"
          bash packaging/macos/build.sh

      - name: Create Homebrew tarball
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          VERSION="${VERSION#v}"
          TAR_NAME="djtoolkit-${VERSION}-arm64.tar.gz"
          tar czf "${TAR_NAME}" -C dist djtoolkit "DJToolkit Setup.app"
          echo "TAR_NAME=${TAR_NAME}" >> "$GITHUB_ENV"
          echo "Created: ${TAR_NAME} ($(du -sh "${TAR_NAME}" | cut -f1))"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          draft: false
          files: |
            *.dmg
            ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release tarballs
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${VERSION#v}"
          gh release download "${{ env.RELEASE_VERSION }}" \
            --pattern "djtoolkit-${VERSION}-arm64.tar.gz"

      - name: Generate formula
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum "djtoolkit-${VERSION}-arm64.tar.gz" | cut -d' ' -f1)

          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_ARM64__/${SHA_ARM64}/g" \
            homebrew/Formula/djtoolkit.rb > djtoolkit.rb

          echo "--- Generated formula ---"
          cat djtoolkit.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yenkz/homebrew-djtoolkit.git" tap
          mkdir -p tap/Formula
          cp djtoolkit.rb tap/Formula/djtoolkit.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/djtoolkit.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update djtoolkit to ${{ env.RELEASE_VERSION }}"
          git push
