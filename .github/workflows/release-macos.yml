name: Release — macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install chromaprint (fpcalc)
        run: brew install chromaprint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build Setup Assistant
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          # Write Config.xcconfig from secret (or fall back to CI placeholder)
          if [ -n "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL = ${SUPABASE_URL}" > setup-assistant/Config.xcconfig
          else
            cp setup-assistant/Config.xcconfig.ci setup-assistant/Config.xcconfig
          fi
          xcodebuild -project setup-assistant/DJToolkitSetup.xcodeproj \
            -scheme DJToolkitSetup \
            -configuration Release \
            -archivePath build/DJToolkitSetup.xcarchive \
            archive -quiet
          xcodebuild -exportArchive \
            -archivePath build/DJToolkitSetup.xcarchive \
            -exportOptionsPlist setup-assistant/ExportOptions.plist \
            -exportPath build/ -quiet
          cp -R "build/DJToolkit Setup.app" dist/
          echo "✓ Setup Assistant built"

      - name: Build installer
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from tag for VERSION
          export VERSION="${VERSION#v}"
          bash packaging/macos/build.sh

      - name: Create Homebrew tarball
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          TAR_NAME="djtoolkit-${VERSION}-arm64.tar.gz"
          tar czf "${TAR_NAME}" -C dist djtoolkit "DJToolkit Setup.app"
          echo "TAR_NAME=${TAR_NAME}" >> "$GITHUB_ENV"
          echo "Created: ${TAR_NAME} ($(du -sh "${TAR_NAME}" | cut -f1))"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            *.dmg
            ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release tarballs
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${VERSION#v}"
          gh release download "${{ github.ref_name }}" \
            --pattern "djtoolkit-${VERSION}-arm64.tar.gz"

      - name: Generate formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum "djtoolkit-${VERSION}-arm64.tar.gz" | cut -d' ' -f1)

          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_ARM64__/${SHA_ARM64}/g" \
            homebrew/Formula/djtoolkit.rb > djtoolkit.rb

          echo "--- Generated formula ---"
          cat djtoolkit.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yenkz/homebrew-djtoolkit.git" tap
          mkdir -p tap/Formula
          cp djtoolkit.rb tap/Formula/djtoolkit.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/djtoolkit.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update djtoolkit to ${{ github.ref_name }}"
          git push
