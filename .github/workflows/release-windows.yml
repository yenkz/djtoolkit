name: Release — Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.12)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv run pip install pystray

      - name: Install PyInstaller
        run: uv run pip install pyinstaller

      - name: Download fpcalc.exe
        run: |
          $chromaprintVersion = "1.5.1"
          $url = "https://github.com/acoustid/chromaprint/releases/download/v${chromaprintVersion}/chromaprint-fpcalc-${chromaprintVersion}-windows-x86_64.zip"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "dist\fpcalc.zip"
          Expand-Archive -Path "dist\fpcalc.zip" -DestinationPath "dist\fpcalc-tmp" -Force
          Get-ChildItem -Path "dist\fpcalc-tmp" -Recurse -Filter "fpcalc.exe" |
            Copy-Item -Destination "dist\fpcalc.exe"
          Remove-Item -Recurse "dist\fpcalc-tmp", "dist\fpcalc.zip"
        shell: pwsh

      - name: Build CLI binary
        env:
          FPCALC_PATH: dist\fpcalc.exe
        run: uv run pyinstaller packaging/windows/djtoolkit.spec --clean --noconfirm

      - name: Install WiX 4
        run: dotnet tool install --global wix --version "4.*"
        shell: pwsh

      - name: Build MSI
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          $v = "$env:VERSION" -replace '^v',''
          $root = (Get-Location).Path
          wix build packaging/windows/djtoolkit.wxs `
            -arch x64 `
            -o "dist/djtoolkit-${v}-windows.msi" `
            -d Version=$v `
            -d BinaryPath="$root\dist\djtoolkit.exe" `
            -d FpcalcPath="$root\dist\fpcalc.exe"
        shell: pwsh

      - name: Delete existing MSI asset
        continue-on-error: true
        run: |
          $v = "$env:RELEASE_VERSION" -replace '^v',''
          gh release delete-asset $env:RELEASE_VERSION "djtoolkit-${v}-windows.msi" --yes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          draft: false
          files: dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
