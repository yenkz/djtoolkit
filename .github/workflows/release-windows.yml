name: Release — Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.12)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Download fpcalc.exe
        run: |
          $chromaprintVersion = "1.5.1"
          $url = "https://github.com/acoustid/chromaprint/releases/download/v${chromaprintVersion}/chromaprint-fpcalc-${chromaprintVersion}-windows-x86_64.zip"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "dist\fpcalc.zip"
          Expand-Archive -Path "dist\fpcalc.zip" -DestinationPath "dist\fpcalc-tmp" -Force
          Get-ChildItem -Path "dist\fpcalc-tmp" -Recurse -Filter "fpcalc.exe" |
            Copy-Item -Destination "dist\fpcalc.exe"
          Remove-Item -Recurse "dist\fpcalc-tmp", "dist\fpcalc.zip"
        shell: pwsh

      - name: Build CLI binary
        env:
          FPCALC_PATH: dist\fpcalc.exe
        run: poetry run pyinstaller packaging/windows/djtoolkit.spec --clean --noconfirm

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore Setup Assistant
        run: dotnet restore setup-assistant-windows/DJToolkitSetup/DJToolkitSetup.csproj -r win-x64
        shell: pwsh

      - name: Build Setup Assistant
        run: |
          msbuild setup-assistant-windows/DJToolkitSetup/DJToolkitSetup.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /v:normal
          Write-Host "--- bin contents ---"
          Get-ChildItem -Recurse -Path "setup-assistant-windows/DJToolkitSetup/bin" -File | ForEach-Object { Write-Host $_.FullName }
          $exe = Get-ChildItem -Recurse -Path "setup-assistant-windows/DJToolkitSetup/bin" -Filter "DJToolkit Setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "DJToolkit Setup.exe not found in bin/"; exit 1 }
          Write-Host "Found: $($exe.FullName)"
          Copy-Item $exe.FullName "dist/"
        shell: pwsh

      - name: Install WiX 4
        run: dotnet tool install --global wix
        shell: pwsh

      - name: Build MSI
        env:
          VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          $v = "$env:VERSION" -replace '^v',''
          wix build packaging/windows/djtoolkit.wxs `
            -o "dist/djtoolkit-${v}-windows.msi" `
            -d Version=$v `
            -d BinaryPath="dist/djtoolkit.exe" `
            -d FpcalcPath="dist/fpcalc.exe" `
            -d SetupPath="dist/DJToolkit Setup.exe"
        shell: pwsh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          draft: false
          files: dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
