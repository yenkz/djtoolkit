name: Release — Tauri Agent

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. agent-v0.1.0)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md << 'NOTES'
          Cross-platform djtoolkit agent app (Tauri v2).

          ### macOS
          1. Download the `.dmg`, open it, drag **djtoolkit** to Applications
          2. On first launch macOS will block the app — go to **System Settings → Privacy & Security** and click **Open Anyway**

          > The app is ad-hoc signed (no paid Apple Developer certificate). No terminal command needed — just follow the Open Anyway prompt.

          ### Windows
          1. Download the `.msi` and run the installer
          2. If Windows SmartScreen appears, click **More info → Run anyway**
          NOTES

          gh release create "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "djtoolkit Agent $RELEASE_VERSION" \
            --notes-file release-notes.md \
            || true

          RELEASE_ID=$(gh release view "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId \
            --jq '.databaseId')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-sidecar:
    name: Build Python sidecar (${{ matrix.name }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target-triple: aarch64-apple-darwin
            spec: packaging/macos/djtoolkit.spec
            binary-name: djtoolkit
          - name: Windows x64
            os: windows-latest
            target-triple: x86_64-pc-windows-msvc
            spec: packaging/windows/djtoolkit.spec
            binary-name: djtoolkit.exe

    runs-on: ${{ matrix.os }}

    env:
      UV_PYTHON: "3.11"
      UV_PYTHON_PREFERENCE: "only-managed"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install chromaprint (macOS)
        if: runner.os == 'macOS'
        run: brew install chromaprint

      - name: Download fpcalc.exe (Windows)
        if: runner.os == 'Windows'
        run: |
          $chromaprintVersion = "1.5.1"
          $url = "https://github.com/acoustid/chromaprint/releases/download/v${chromaprintVersion}/chromaprint-fpcalc-${chromaprintVersion}-windows-x86_64.zip"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "dist\fpcalc.zip"
          Expand-Archive -Path "dist\fpcalc.zip" -DestinationPath "dist\fpcalc-tmp" -Force
          Get-ChildItem -Path "dist\fpcalc-tmp" -Recurse -Filter "fpcalc.exe" |
            Copy-Item -Destination "dist\fpcalc.exe"
          Remove-Item -Recurse "dist\fpcalc-tmp", "dist\fpcalc.zip"
        shell: pwsh

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: uv venv --python 3.11 --clear

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build sidecar binary
        run: uv run python -m PyInstaller ${{ matrix.spec }} --clean --noconfirm

      - name: Smoke-test sidecar binary (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== djtoolkit --help (verifies Python loads and CLI boots) ==="
          ./dist/${{ matrix.binary-name }} --help

      - name: Smoke-test sidecar binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "=== djtoolkit --help (verifies Python loads and CLI boots) ==="
          .\dist\${{ matrix.binary-name }} --help
        shell: pwsh

      - name: Rename sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          mv dist/${{ matrix.binary-name }} dist/djtoolkit-${{ matrix.target-triple }}
          chmod +x dist/djtoolkit-${{ matrix.target-triple }}

      - name: Rename sidecar (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path "dist\${{ matrix.binary-name }}" -Destination "dist\djtoolkit-${{ matrix.target-triple }}.exe"
        shell: pwsh

      - name: Bundle fpcalc (macOS)
        if: runner.os == 'macOS'
        run: |
          FPCALC=$(which fpcalc || echo "/opt/homebrew/bin/fpcalc")
          cp "$FPCALC" dist/fpcalc-${{ matrix.target-triple }}
          chmod +x dist/fpcalc-${{ matrix.target-triple }}

      - name: Bundle fpcalc (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path "dist\fpcalc.exe" -Destination "dist\fpcalc-${{ matrix.target-triple }}.exe"
        shell: pwsh

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target-triple }}
          path: |
            dist/djtoolkit-${{ matrix.target-triple }}*
            dist/fpcalc-${{ matrix.target-triple }}*

  build-tauri:
    name: Build Tauri app (${{ matrix.name }})
    needs: [build-sidecar, create-release]
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            target-triple: aarch64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            target-triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: agent-app/src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: agent-app
        run: npm ci

      - name: Patch app version from tag
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#agent-v}"
          node -e "const p='agent-app/src-tauri/tauri.conf.json'; const j=JSON.parse(require('fs').readFileSync(p,'utf8')); j.version='${VERSION}'; require('fs').writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Regenerate icons
        working-directory: agent-app
        shell: bash
        run: npm run tauri -- icon src-tauri/icons/icon.png

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target-triple }}
          path: agent-app/src-tauri/binaries/

      - name: Make sidecar executable (macOS)
        if: runner.os == 'macOS'
        run: chmod +x agent-app/src-tauri/binaries/*

      - name: List sidecar binaries
        shell: bash
        run: ls -la agent-app/src-tauri/binaries/

      # ── macOS: build Tauri, then replace the sidecar with the original ──
      #
      # PyInstaller builds an internally-consistent onefile binary: the bootloader
      # and all embedded libraries share the same ad-hoc identity. Tauri's codesign
      # re-signs the outer binary, breaking this consistency. On macOS 15 with the
      # quarantine flag (from downloading the .dmg), dlopen() rejects the mismatch.
      #
      # Fix: after Tauri builds, REPLACE the re-signed sidecar with the original
      # PyInstaller binary. Then seal the .app (without --deep) so the bundle hash
      # covers all files. The sidecar keeps its original PyInstaller signature.
      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        working-directory: agent-app
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Replace sidecar with original PyInstaller binary (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          APP_PATH=$(find agent-app/src-tauri/target -name "djtoolkit.app" -type d -path "*/bundle/macos/*" | head -1)
          SIDECAR="$APP_PATH/Contents/MacOS/djtoolkit"
          ORIGINAL="agent-app/src-tauri/binaries/djtoolkit-${{ matrix.target-triple }}"

          echo "App bundle: $APP_PATH"
          echo ""
          echo "=== Before: sidecar signature (Tauri re-signed) ==="
          codesign -dvv "$SIDECAR" 2>&1 | grep -E "Identifier=|TeamIdentifier=|Signature=" || true

          echo ""
          echo "Replacing with original PyInstaller binary..."
          cp "$ORIGINAL" "$SIDECAR"
          chmod +x "$SIDECAR"

          echo ""
          echo "=== After: sidecar signature (original PyInstaller) ==="
          codesign -dvv "$SIDECAR" 2>&1 | grep -E "Identifier=|TeamIdentifier=|Signature=" || true

          # Seal the .app bundle (without --deep).
          # This creates CodeResources hashes covering all files including the
          # replaced sidecar. Individual binaries keep their own signatures.
          echo ""
          echo "Sealing .app bundle..."
          codesign --force --sign - "$APP_PATH"
          echo "Sealed: $APP_PATH"

      # The critical test: run the sidecar FROM WITHIN the signed .app bundle.
      # This catches the exact Team ID mismatch that users see.
      - name: Smoke-test bundled sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH=$(find agent-app/src-tauri/target -name "djtoolkit.app" -type d -path "*/bundle/macos/*" | head -1)
          SIDECAR="$APP_PATH/Contents/MacOS/djtoolkit"

          echo "=== Running bundled sidecar: $SIDECAR ==="
          "$SIDECAR" --help

      - name: Create .dmg (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          VERSION="${RELEASE_VERSION#agent-v}"
          APP_PATH=$(find agent-app/src-tauri/target -name "djtoolkit.app" -type d -path "*/bundle/macos/*" | head -1)
          DMG_NAME="djtoolkit_${VERSION}_aarch64.dmg"

          echo "Creating $DMG_NAME from $APP_PATH"

          TMP_DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$TMP_DMG_DIR/"

          hdiutil create \
            -volname "djtoolkit $VERSION" \
            -srcfolder "$TMP_DMG_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf "$TMP_DMG_DIR"
          echo "Created: $DMG_NAME ($(du -sh "$DMG_NAME" | cut -f1))"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload .dmg to release (macOS)
        if: runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            "$DMG_NAME" \
            --clobber

      # ── Windows: use tauri-action as before (no signing issues) ──
      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agent-app
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ env.RELEASE_VERSION }}
          releaseDraft: false
          prerelease: false
