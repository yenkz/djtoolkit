name: Release — Tauri Agent

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. agent-v0.1.0)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md << 'NOTES'
          Cross-platform djtoolkit agent app (Tauri v2).

          ### macOS
          1. Download the `.dmg`, open it, drag **djtoolkit** to Applications
          2. On first launch macOS will block the app — go to **System Settings → Privacy & Security** and click **Open Anyway**

          > The app is ad-hoc signed (no paid Apple Developer certificate). No terminal command needed — just follow the Open Anyway prompt.

          ### Windows
          1. Download the `.msi` and run the installer
          2. If Windows SmartScreen appears, click **More info → Run anyway**
          NOTES

          gh release create "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "djtoolkit Agent $RELEASE_VERSION" \
            --notes-file release-notes.md \
            || true

          RELEASE_ID=$(gh release view "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId \
            --jq '.databaseId')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-sidecar:
    name: Build Python sidecar (${{ matrix.name }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target-triple: aarch64-apple-darwin
            # onedir mode — all native libs are separate files on disk.
            # The tar is extracted to ~/.djtoolkit/agent/ at first launch,
            # outside the .app bundle, avoiding macOS 15 signing issues.
            spec: packaging/macos/djtoolkit-onedir.spec
            binary-name: djtoolkit
          - name: macOS x86_64
            os: macos-15
            target-triple: x86_64-apple-darwin
            # Built on ARM runner via setup-python x64 (Rosetta 2).
            # macos-13 Intel runners are deprecated. We use setup-python
            # with architecture: x64 to get x86_64 Python, then pip
            # instead of uv (the uv binary from setup-uv is ARM-only).
            spec: packaging/macos/djtoolkit-onedir.spec
            binary-name: djtoolkit
          - name: Windows x64
            os: windows-latest
            target-triple: x86_64-pc-windows-msvc
            spec: packaging/windows/djtoolkit.spec
            binary-name: djtoolkit.exe

    runs-on: ${{ matrix.os }}

    env:
      UV_PYTHON: "3.11"
      UV_PYTHON_PREFERENCE: "only-managed"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install chromaprint (macOS arm64)
        if: runner.os == 'macOS' && matrix.target-triple == 'aarch64-apple-darwin'
        run: brew install chromaprint

      - name: Download fpcalc (macOS x86_64)
        if: runner.os == 'macOS' && matrix.target-triple == 'x86_64-apple-darwin'
        run: |
          curl -fsSL -o /tmp/fpcalc.tar.gz \
            "https://github.com/acoustid/chromaprint/releases/download/v1.5.1/chromaprint-fpcalc-1.5.1-macos-x86_64.tar.gz"
          tar xzf /tmp/fpcalc.tar.gz -C /tmp
          sudo mkdir -p /usr/local/bin
          sudo cp /tmp/chromaprint-fpcalc-1.5.1-macos-x86_64/fpcalc /usr/local/bin/fpcalc
          chmod +x /usr/local/bin/fpcalc

      - name: Download fpcalc.exe (Windows)
        if: runner.os == 'Windows'
        run: |
          $chromaprintVersion = "1.5.1"
          $url = "https://github.com/acoustid/chromaprint/releases/download/v${chromaprintVersion}/chromaprint-fpcalc-${chromaprintVersion}-windows-x86_64.zip"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "dist\fpcalc.zip"
          Expand-Archive -Path "dist\fpcalc.zip" -DestinationPath "dist\fpcalc-tmp" -Force
          Get-ChildItem -Path "dist\fpcalc-tmp" -Recurse -Filter "fpcalc.exe" |
            Copy-Item -Destination "dist\fpcalc.exe"
          Remove-Item -Recurse "dist\fpcalc-tmp", "dist\fpcalc.zip"
        shell: pwsh

      # ── Python toolchain: uv (arm64 + Windows) ──
      - name: Install uv
        if: matrix.target-triple != 'x86_64-apple-darwin'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        if: matrix.target-triple != 'x86_64-apple-darwin'
        run: uv venv --python 3.11 --clear

      - name: Install dependencies
        if: matrix.target-triple != 'x86_64-apple-darwin'
        run: uv sync --frozen

      - name: Install PyInstaller
        if: matrix.target-triple != 'x86_64-apple-darwin'
        run: uv pip install pyinstaller

      - name: Build sidecar binary
        if: matrix.target-triple != 'x86_64-apple-darwin'
        run: uv run python -m PyInstaller ${{ matrix.spec }} --clean --noconfirm

      # ── Python toolchain: setup-python x64 + pip (macOS x86_64) ──
      # The setup-uv binary is ARM-only, so for x86_64 we use
      # setup-python with architecture: x64 (runs under Rosetta 2)
      # and pip for dependency management.
      - name: Set up Python 3.11 (x86_64 via Rosetta)
        if: matrix.target-triple == 'x86_64-apple-darwin'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64

      - name: Install dependencies (x86_64)
        if: matrix.target-triple == 'x86_64-apple-darwin'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install pyinstaller
          pip install .

      - name: Build sidecar binary (x86_64)
        if: matrix.target-triple == 'x86_64-apple-darwin'
        run: |
          source .venv/bin/activate
          python -m PyInstaller ${{ matrix.spec }} --clean --noconfirm

      # Re-sign all native libraries with ad-hoc to strip any real Team IDs.
      # python-build-standalone's libpython3.11.dylib carries Astral's Team ID;
      # PyInstaller's install_name_tool invalidates the original signatures but
      # doesn't re-sign all collected dylibs. Ad-hoc signing strips the Team ID
      # so all binaries have TeamIdentifier=not set, resolving the mismatch.
      - name: Re-sign onedir binaries with ad-hoc (macOS)
        if: runner.os == 'macOS'
        run: |
          DIST="dist/djtoolkit"
          SIGNED=0
          while IFS= read -r -d '' f; do
            codesign --force --sign - "$f"
            SIGNED=$((SIGNED + 1))
          done < <(find "$DIST/_internal" -type f \( -name "*.dylib" -o -name "*.so" \) -print0)
          codesign --force --sign - "$DIST/djtoolkit"
          echo "Re-signed $SIGNED libraries + bootloader"

      - name: Smoke-test sidecar binary (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== djtoolkit --help ==="
          ./dist/djtoolkit/djtoolkit --help

      - name: Smoke-test sidecar binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "=== djtoolkit --help ==="
          .\dist\${{ matrix.binary-name }} --help
        shell: pwsh

      # macOS: tar the onedir output for Tauri resource bundling
      - name: Prepare sidecar artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          # Tar the entire onedir directory
          tar czf dist/djtoolkit-agent.tar.gz -C dist djtoolkit
          echo "Agent tar: $(du -sh dist/djtoolkit-agent.tar.gz | cut -f1)"

          # Bundle fpcalc (ARM: /opt/homebrew/bin, x86_64: /usr/local/bin)
          FPCALC=$(which fpcalc || echo "/opt/homebrew/bin/fpcalc")
          [ ! -f "$FPCALC" ] && FPCALC="/usr/local/bin/fpcalc"
          cp "$FPCALC" dist/fpcalc-${{ matrix.target-triple }}
          chmod +x dist/fpcalc-${{ matrix.target-triple }}

      # Windows: onefile binary + fpcalc (unchanged)
      - name: Prepare sidecar artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path "dist\${{ matrix.binary-name }}" -Destination "dist\djtoolkit-${{ matrix.target-triple }}.exe"
          Move-Item -Path "dist\fpcalc.exe" -Destination "dist\fpcalc-${{ matrix.target-triple }}.exe"
        shell: pwsh

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target-triple }}
          path: |
            dist/djtoolkit-agent.tar.gz
            dist/djtoolkit-${{ matrix.target-triple }}*
            dist/fpcalc-${{ matrix.target-triple }}*

  build-tauri:
    name: Build Tauri app (${{ matrix.name }})
    needs: [build-sidecar, create-release]
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            target-triple: aarch64-apple-darwin
          - name: macOS x86_64
            os: macos-15
            target: x86_64-apple-darwin
            target-triple: x86_64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            target-triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: agent-app/src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: agent-app
        run: npm ci

      - name: Patch app version from tag
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#agent-v}"
          # Ensure semver (Tauri requires X.Y.Z, not X.Y)
          case "$VERSION" in
            *.*.*)  ;; # already 3-part
            *.*)    VERSION="${VERSION}.0" ;; # 0.3 → 0.3.0
            *)      VERSION="${VERSION}.0.0" ;; # 3 → 3.0.0
          esac
          echo "Patching version to: $VERSION"
          node -e "const p='agent-app/src-tauri/tauri.conf.json'; const j=JSON.parse(require('fs').readFileSync(p,'utf8')); j.version='${VERSION}'; require('fs').writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      - name: Regenerate icons
        working-directory: agent-app
        shell: bash
        run: npm run tauri -- icon src-tauri/icons/icon.png

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target-triple }}
          path: agent-app/src-tauri/binaries/

      - name: Make sidecar executable (macOS)
        if: runner.os == 'macOS'
        run: chmod +x agent-app/src-tauri/binaries/*

      # Tauri bundles both resources (tar.gz + exe) on all platforms.
      # Create empty placeholders for the platform-irrelevant resource
      # so the build doesn't fail on missing files.
      - name: Prepare Windows sidecar resource
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "agent-app/src-tauri/binaries/djtoolkit-${{ matrix.target-triple }}.exe" `
                    "agent-app/src-tauri/binaries/djtoolkit-sidecar.exe"
          # macOS tar.gz doesn't exist on Windows — create empty placeholder
          New-Item -Path "agent-app/src-tauri/binaries/djtoolkit-agent.tar.gz" -ItemType File -Force

      - name: Prepare macOS sidecar placeholder
        if: runner.os == 'macOS'
        run: |
          # Windows sidecar doesn't exist on macOS — create empty placeholder
          touch agent-app/src-tauri/binaries/djtoolkit-sidecar.exe

      - name: List sidecar binaries
        shell: bash
        run: ls -la agent-app/src-tauri/binaries/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agent-app
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ env.RELEASE_VERSION }}
          releaseDraft: false
          prerelease: false

  generate-update-manifest:
    name: Generate update manifest
    needs: [build-tauri, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION#agent-v}"
          mkdir -p assets
          gh release download "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.sig" \
            --dir assets/ || true
          ls -la assets/

      - name: Build latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION#agent-v}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_VERSION}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          SIG_DARWIN_AARCH64=""
          SIG_DARWIN_X86_64=""
          SIG_WINDOWS_X86_64=""

          for sig_file in assets/*.sig; do
            [ -f "$sig_file" ] || continue
            name=$(basename "$sig_file")
            content=$(cat "$sig_file")
            case "$name" in
              *aarch64.app.tar.gz.sig)   SIG_DARWIN_AARCH64="$content" ;;
              *x86_64.app.tar.gz.sig)    SIG_DARWIN_X86_64="$content" ;;
              *x64-setup.nsis.zip.sig)   SIG_WINDOWS_X86_64="$content" ;;
              *x64_en-US.msi.zip.sig)    SIG_WINDOWS_X86_64="$content" ;;
            esac
          done

          cat > latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "notes": "djtoolkit Agent ${RELEASE_VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG_DARWIN_AARCH64}",
                "url": "${REPO_URL}/djtoolkit_${VERSION}_aarch64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${SIG_DARWIN_X86_64}",
                "url": "${REPO_URL}/djtoolkit_${VERSION}_x86_64.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${SIG_WINDOWS_X86_64}",
                "url": "${REPO_URL}/djtoolkit_${VERSION}_x64_en-US.msi.zip"
              }
            }
          }
          MANIFEST

          echo "--- latest.json ---"
          cat latest.json

      - name: Upload manifest to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset "$RELEASE_VERSION" latest.json \
            --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release upload "$RELEASE_VERSION" latest.json \
            --repo "$GITHUB_REPOSITORY"

  update-homebrew-cask:
    name: Update Homebrew cask
    needs: [build-tauri, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download DMGs and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION#agent-v}"
          mkdir -p dmgs

          gh release download "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.dmg" \
            --dir dmgs/

          ls -la dmgs/

          SHA_ARM64=$(sha256sum dmgs/*aarch64*.dmg | cut -d' ' -f1)
          SHA_X86_64=$(sha256sum dmgs/*x86_64*.dmg | cut -d' ' -f1)

          echo "ARM64:  $SHA_ARM64"
          echo "X86_64: $SHA_X86_64"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SHA_ARM64=$SHA_ARM64" >> "$GITHUB_ENV"
          echo "SHA_X86_64=$SHA_X86_64" >> "$GITHUB_ENV"

      - name: Update cask formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yenkz/homebrew-djtoolkit.git" tap
          mkdir -p tap/Casks

          cat > tap/Casks/djtoolkit.rb << 'CASK'
          cask "djtoolkit" do
            arch arm: "aarch64", intel: "x86_64"
            version "VERSION_PLACEHOLDER"
            sha256 arm:   "SHA_ARM64_PLACEHOLDER",
                   intel: "SHA_X86_64_PLACEHOLDER"

            url "https://github.com/yenkz/djtoolkit/releases/download/agent-v#{version}/djtoolkit_#{version}_#{arch}.dmg",
                verified: "github.com/yenkz/djtoolkit/"
            name "DJ Toolkit"
            desc "DJ library agent — download, tag, and organize music automatically"
            homepage "https://www.djtoolkit.net"

            depends_on macos: ">= :ventura"
            app "djtoolkit.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/djtoolkit.app"],
                             sudo: false
            end

            uninstall quit: "net.djtoolkit.agent"

            zap trash: [
              "~/.djtoolkit",
              "~/Library/Caches/net.djtoolkit.agent",
              "~/Library/Preferences/net.djtoolkit.agent.plist",
              "~/Library/Saved Application State/net.djtoolkit.agent.savedState",
            ]

            caveats <<~EOS
              DJ Toolkit runs as a menu bar agent. After install, launch it
              and complete the setup wizard. It will then live in your menu bar.
            EOS
          end
          CASK

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Casks/djtoolkit.rb
          sed -i "s/SHA_ARM64_PLACEHOLDER/${SHA_ARM64}/g" tap/Casks/djtoolkit.rb
          sed -i "s/SHA_X86_64_PLACEHOLDER/${SHA_X86_64}/g" tap/Casks/djtoolkit.rb

          echo "--- Generated cask ---"
          cat tap/Casks/djtoolkit.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/djtoolkit.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update djtoolkit cask to ${VERSION}"
          git push
