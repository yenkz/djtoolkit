name: Release — Tauri Agent

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. agent-v0.1.0)"
        required: true

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md << 'NOTES'
          Cross-platform djtoolkit agent app (Tauri v2).

          ### macOS
          1. Download the `.dmg`, open it, drag **djtoolkit** to Applications
          2. On first launch macOS will block the app — go to **System Settings → Privacy & Security** and click **Open Anyway**

          > The app is ad-hoc signed (no paid Apple Developer certificate). No terminal command needed — just follow the Open Anyway prompt.

          ### Windows
          1. Download the `.msi` and run the installer
          2. If Windows SmartScreen appears, click **More info → Run anyway**
          NOTES

          gh release create "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "djtoolkit Agent $RELEASE_VERSION" \
            --notes-file release-notes.md \
            || true

          RELEASE_ID=$(gh release view "$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId \
            --jq '.databaseId')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build-sidecar:
    name: Build Python sidecar (${{ matrix.name }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target-triple: aarch64-apple-darwin
            spec: packaging/macos/djtoolkit.spec
            binary-name: djtoolkit
          - name: Windows x64
            os: windows-latest
            target-triple: x86_64-pc-windows-msvc
            spec: packaging/windows/djtoolkit.spec
            binary-name: djtoolkit.exe

    runs-on: ${{ matrix.os }}

    # Force uv to use its own managed Python (python-build-standalone) rather
    # than any system python.org Python present on the runner. python.org
    # Python.framework carries Apple's Team ID; python-build-standalone does not,
    # so it bundles cleanly into a PyInstaller onefile without Team ID mismatches.
    env:
      UV_PYTHON: "3.11"
      UV_PYTHON_PREFERENCE: "only-managed"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install chromaprint (macOS)
        if: runner.os == 'macOS'
        run: brew install chromaprint

      - name: Download fpcalc.exe (Windows)
        if: runner.os == 'Windows'
        run: |
          $chromaprintVersion = "1.5.1"
          $url = "https://github.com/acoustid/chromaprint/releases/download/v${chromaprintVersion}/chromaprint-fpcalc-${chromaprintVersion}-windows-x86_64.zip"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "dist\fpcalc.zip"
          Expand-Archive -Path "dist\fpcalc.zip" -DestinationPath "dist\fpcalc-tmp" -Force
          Get-ChildItem -Path "dist\fpcalc-tmp" -Recurse -Filter "fpcalc.exe" |
            Copy-Item -Destination "dist\fpcalc.exe"
          Remove-Item -Recurse "dist\fpcalc-tmp", "dist\fpcalc.zip"
        shell: pwsh

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      # Explicitly create the venv with python-build-standalone 3.11.
      # Without this, uv may find and use a system python.org Python (e.g. 3.14)
      # that satisfies requires-python >=3.11 and is available on the runner.
      - name: Create virtual environment
        run: uv venv --python 3.11 --clear

      - name: Install dependencies
        run: uv sync --frozen

      # Install PyInstaller using the explicit Python interpreter, not the
      # `pyinstaller` script, to prevent PATH resolution from picking up a
      # system-installed pyinstaller from python.org Python.
      - name: Install PyInstaller
        run: uv pip install pyinstaller

      # Re-sign all native binaries with ad-hoc signatures before PyInstaller bundles them.
      # python-build-standalone carries Astral's Team ID; python.org carries Apple's.
      # macOS 15+ enforces that dlopen-ed libraries share the same Team ID as the loading
      # process. Our PyInstaller onefile is ad-hoc signed (no Team ID), so any embedded
      # library with a real Team ID causes PYI-30900 at runtime. We must re-sign BOTH the
      # Python prefix (libpython3.11.dylib, etc.) AND venv site-packages (cryptography,
      # cffi, etc.) to remove all Team IDs before bundling.
      - name: Re-sign all native binaries with ad-hoc before bundling (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail

          PYTHON_REAL=$(uv run python -c "import os,sys; print(os.path.realpath(sys.executable))")
          PYTHON_PREFIX=$(cd "$(dirname "$PYTHON_REAL")/.." && pwd)
          VENV_SITE=$(uv run python -c "import site; print(site.getsitepackages()[0])")

          echo "Python executable: $PYTHON_REAL"
          echo "Python prefix:     $PYTHON_PREFIX"
          echo "Venv site-packages: $VENV_SITE"

          SIGNED=0
          FAILED=0
          FAIL_LIST=$(mktemp)

          for dir in "$PYTHON_PREFIX" "$VENV_SITE"; do
            if [ ! -d "$dir" ]; then
              echo "SKIP: $dir does not exist"
              continue
            fi
            echo "--- Signing binaries under: $dir ---"
            while IFS= read -r -d '' f; do
              if codesign --force --sign - "$f" 2>&1; then
                echo "  [OK] $f"
                SIGNED=$((SIGNED + 1))
              else
                echo "  [FAIL] $f"
                echo "$f" >> "$FAIL_LIST"
                FAILED=$((FAILED + 1))
              fi
            done < <(find "$dir" -type f \( -name "*.dylib" -o -name "*.so" -o -name "Python" \) -print0)
          done

          echo ""
          echo "=== Re-signing summary: $SIGNED signed, $FAILED failed ==="

          if [ "$FAILED" -gt 0 ]; then
            echo "Failed files:"
            cat "$FAIL_LIST"
            rm -f "$FAIL_LIST"
            exit 1
          fi
          rm -f "$FAIL_LIST"

          # Verify libpython specifically — this is the dylib that causes PYI-30900
          LIBPYTHON=$(find "$PYTHON_PREFIX" -name "libpython3*.dylib" -print -quit)
          if [ -z "$LIBPYTHON" ]; then
            echo "WARNING: libpython3*.dylib not found under $PYTHON_PREFIX"
            echo "PyInstaller may use a statically-linked Python — continuing"
          else
            echo ""
            echo "=== Verifying: $LIBPYTHON ==="
            codesign -dvv "$LIBPYTHON" 2>&1 || true
            TEAM_ID=$(codesign -dvv "$LIBPYTHON" 2>&1 | grep 'TeamIdentifier=' | cut -d= -f2)
            if [ "$TEAM_ID" != "not set" ]; then
              echo "ERROR: $LIBPYTHON still has TeamIdentifier=$TEAM_ID after re-signing"
              exit 1
            fi
            echo "TeamIdentifier=not set — OK"
          fi

      - name: Build sidecar binary
        run: uv run python -m PyInstaller ${{ matrix.spec }} --clean --noconfirm

      # Smoke-test the built binary before renaming / uploading.
      # If Python fails to load (Team ID mismatch, missing dylib, etc.) the
      # bootloader exits non-zero here and CI fails before a broken DMG is released.
      - name: Smoke-test sidecar binary (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "=== djtoolkit --help (verifies Python loads and CLI boots) ==="
          ./dist/${{ matrix.binary-name }} --help

          echo ""
          echo "=== DYLD library load diagnostics ==="
          DYLD_PRINT_LIBRARIES=1 ./dist/${{ matrix.binary-name }} --help 2>&1 | head -50 || true

      - name: Smoke-test sidecar binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Write-Host "=== djtoolkit --help (verifies Python loads and CLI boots) ==="
          .\dist\${{ matrix.binary-name }} --help
        shell: pwsh

      # Rename to Tauri sidecar convention: djtoolkit-{target-triple}
      - name: Rename sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          mv dist/${{ matrix.binary-name }} dist/djtoolkit-${{ matrix.target-triple }}
          chmod +x dist/djtoolkit-${{ matrix.target-triple }}

      - name: Rename sidecar (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path "dist\${{ matrix.binary-name }}" -Destination "dist\djtoolkit-${{ matrix.target-triple }}.exe"
        shell: pwsh

      # Bundle fpcalc alongside
      - name: Bundle fpcalc (macOS)
        if: runner.os == 'macOS'
        run: |
          FPCALC=$(which fpcalc || echo "/opt/homebrew/bin/fpcalc")
          cp "$FPCALC" dist/fpcalc-${{ matrix.target-triple }}
          chmod +x dist/fpcalc-${{ matrix.target-triple }}

      - name: Bundle fpcalc (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path "dist\fpcalc.exe" -Destination "dist\fpcalc-${{ matrix.target-triple }}.exe"
        shell: pwsh

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target-triple }}
          path: |
            dist/djtoolkit-${{ matrix.target-triple }}*
            dist/fpcalc-${{ matrix.target-triple }}*

  build-tauri:
    name: Build Tauri app (${{ matrix.name }})
    needs: [build-sidecar, create-release]
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: macOS arm64
            os: macos-15
            target: aarch64-apple-darwin
            target-triple: aarch64-apple-darwin
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            target-triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: agent-app/src-tauri

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: agent-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: agent-app
        run: npm ci

      # Patch the version in tauri.conf.json to match the release tag (strips "agent-v" prefix)
      - name: Patch app version from tag
        shell: bash
        run: |
          VERSION="${RELEASE_VERSION#agent-v}"
          node -e "const p='agent-app/src-tauri/tauri.conf.json'; const j=JSON.parse(require('fs').readFileSync(p,'utf8')); j.version='${VERSION}'; require('fs').writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      # Regenerate all icon formats from icon.png so .icns/.ico stay in sync
      - name: Regenerate icons
        working-directory: agent-app
        shell: bash
        run: npm run tauri -- icon src-tauri/icons/icon.png

      # Download the sidecar binary built in the previous job
      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target-triple }}
          path: agent-app/src-tauri/binaries/

      - name: Make sidecar executable (macOS)
        if: runner.os == 'macOS'
        run: chmod +x agent-app/src-tauri/binaries/*

      - name: List sidecar binaries
        shell: bash
        run: ls -la agent-app/src-tauri/binaries/

      # Build the Tauri app and upload artifacts to the pre-created release
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows code signing (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agent-app
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ env.RELEASE_VERSION }}
          releaseDraft: false
          prerelease: false
