name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix, e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  update-formula:
    name: Update Homebrew formula
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag
            TAG="${{ github.event.release.tag_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release assets and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Download the tar.gz assets from the release
          gh release download "v${VERSION}" \
            --pattern "djtoolkit-${VERSION}-arm64.tar.gz" \
            --pattern "djtoolkit-${VERSION}-x86_64.tar.gz"

          # Compute SHA256 checksums
          SHA_ARM64=$(shasum -a 256 "djtoolkit-${VERSION}-arm64.tar.gz" | cut -d ' ' -f 1)
          SHA_X86_64=$(shasum -a 256 "djtoolkit-${VERSION}-x86_64.tar.gz" | cut -d ' ' -f 1)

          echo "sha256_arm64=${SHA_ARM64}" >> "$GITHUB_OUTPUT"
          echo "sha256_x86_64=${SHA_X86_64}" >> "$GITHUB_OUTPUT"
        id: sha

      - name: Update formula from template
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256_ARM64: ${{ steps.sha.outputs.sha256_arm64 }}
          SHA256_X86_64: ${{ steps.sha.outputs.sha256_x86_64 }}
        run: |
          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_ARM64__/${SHA256_ARM64}/g" \
            -e "s/__SHA256_X86_64__/${SHA256_X86_64}/g" \
            homebrew/Formula/djtoolkit.rb.template > homebrew/Formula/djtoolkit.rb

      - name: Commit and push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/Formula/djtoolkit.rb
          git commit -m "homebrew: update djtoolkit to v${VERSION}"
          git push
        env:
          VERSION: ${{ steps.version.outputs.version }}
