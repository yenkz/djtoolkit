name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # required to upload release assets
  packages: write    # for consistency; release.yml doesn't push images but may in future

jobs:
  build-macos:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install chromaprint (fpcalc)
        run: brew install chromaprint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build Setup Assistant
        run: |
          xcodebuild -project setup-assistant/DJToolkitSetup.xcodeproj \
            -scheme DJToolkitSetup \
            -configuration Release \
            -archivePath build/DJToolkitSetup.xcarchive \
            archive -quiet
          xcodebuild -exportArchive \
            -archivePath build/DJToolkitSetup.xcarchive \
            -exportOptionsPlist setup-assistant/ExportOptions.plist \
            -exportPath build/ -quiet
          cp -R "build/DJToolkit Setup.app" dist/
          echo "✓ Setup Assistant built"

      - name: Build installer
        env:
          VERSION: ${{ github.ref_name }}   # e.g. "v1.0.0"
        run: |
          # Strip leading 'v' from tag for VERSION
          export VERSION="${VERSION#v}"
          bash packaging/macos/build.sh

      - name: Create Homebrew tarball
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          TAR_NAME="djtoolkit-${VERSION}-arm64.tar.gz"
          tar czf "${TAR_NAME}" -C dist djtoolkit "DJToolkit Setup.app"
          echo "TAR_NAME=${TAR_NAME}" >> "$GITHUB_ENV"
          echo "Created: ${TAR_NAME} ($(du -sh "${TAR_NAME}" | cut -f1))"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            *.dmg
            ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build CLI binary
        run: |
          poetry run pyinstaller --onefile --name djtoolkit djtoolkit/__main__.py
        shell: pwsh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Setup Assistant
        run: |
          dotnet build setup-assistant-windows/DJToolkitSetup.sln -c Release
          Copy-Item "setup-assistant-windows/DJToolkitSetup/bin/Release/net8.0-windows10.0.22621.0/DJToolkit Setup.exe" "dist/"
        shell: pwsh

      - name: Build MSI with WiX
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $ver = $env:VERSION -replace '^v',''
          dotnet tool install --global wix
          wix build packaging/windows/djtoolkit.wxs -o "djtoolkit-${ver}-x64.msi" -d Version=$ver -d SetupPath="dist/DJToolkit Setup.exe"
        shell: pwsh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: "*.msi"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release tarballs
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${VERSION#v}"
          gh release download "${{ github.ref_name }}" \
            --pattern "djtoolkit-${VERSION}-arm64.tar.gz"

      - name: Generate formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum "djtoolkit-${VERSION}-arm64.tar.gz" | cut -d' ' -f1)

          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_ARM64__/${SHA_ARM64}/g" \
            homebrew/Formula/djtoolkit.rb > djtoolkit.rb

          echo "--- Generated formula ---"
          cat djtoolkit.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yenkz/homebrew-djtoolkit.git" tap
          mkdir -p tap/Formula
          cp djtoolkit.rb tap/Formula/djtoolkit.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/djtoolkit.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update djtoolkit to ${{ github.ref_name }}"
          git push
