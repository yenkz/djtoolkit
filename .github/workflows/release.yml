name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # required to upload release assets
  packages: write    # for consistency; release.yml doesn't push images but may in future

jobs:
  build-macos:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install chromaprint (fpcalc)
        run: brew install chromaprint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build Setup Assistant
        run: |
          xcodebuild -project setup-assistant/DJToolkitSetup.xcodeproj \
            -scheme DJToolkitSetup \
            -configuration Release \
            -archivePath build/DJToolkitSetup.xcarchive \
            archive -quiet
          xcodebuild -exportArchive \
            -archivePath build/DJToolkitSetup.xcarchive \
            -exportOptionsPlist setup-assistant/ExportOptions.plist \
            -exportPath build/ -quiet
          cp -R "build/DJToolkit Setup.app" dist/
          echo "✓ Setup Assistant built"

      - name: Build installer
        env:
          VERSION: ${{ github.ref_name }}   # e.g. "v1.0.0"
        run: |
          # Strip leading 'v' from tag for VERSION
          export VERSION="${VERSION#v}"
          bash packaging/macos/build.sh

      - name: Create Homebrew tarball
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          TAR_NAME="djtoolkit-${VERSION}-arm64.tar.gz"
          tar czf "${TAR_NAME}" -C dist djtoolkit "DJToolkit Setup.app"
          echo "TAR_NAME=${TAR_NAME}" >> "$GITHUB_ENV"
          echo "Created: ${TAR_NAME} ($(du -sh "${TAR_NAME}" | cut -f1))"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            *.dmg
            ${{ env.TAR_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Download fpcalc.exe
        run: |
          $chromaprintVersion = "1.5.1"
          $url = "https://github.com/acoustid/chromaprint/releases/download/v${chromaprintVersion}/chromaprint-fpcalc-${chromaprintVersion}-windows-x86_64.zip"
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "dist\fpcalc.zip"
          Expand-Archive -Path "dist\fpcalc.zip" -DestinationPath "dist\fpcalc-tmp" -Force
          Get-ChildItem -Path "dist\fpcalc-tmp" -Recurse -Filter "fpcalc.exe" |
            Copy-Item -Destination "dist\fpcalc.exe"
          Remove-Item -Recurse "dist\fpcalc-tmp", "dist\fpcalc.zip"
        shell: pwsh

      - name: Build CLI binary
        env:
          FPCALC_PATH: dist\fpcalc.exe
        run: poetry run pyinstaller packaging/windows/djtoolkit.spec --clean --noconfirm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore Setup Assistant
        run: msbuild setup-assistant-windows/DJToolkitSetup.sln /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Build Setup Assistant
        run: |
          msbuild setup-assistant-windows/DJToolkitSetup.sln /p:Configuration=Release /p:Platform=x64
          $exe = Get-ChildItem -Recurse -Path "setup-assistant-windows/DJToolkitSetup/bin" -Filter "DJToolkit Setup.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "DJToolkit Setup.exe not found in bin/"; exit 1 }
          Write-Host "Found: $($exe.FullName)"
          Copy-Item $exe.FullName "dist/"
        shell: pwsh

      - name: Install WiX 4
        run: dotnet tool install --global wix
        shell: pwsh

      - name: Build MSI
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          $v = "$env:VERSION" -replace '^v',''
          wix build packaging/windows/djtoolkit.wxs `
            -o "dist/djtoolkit-${v}-windows.msi" `
            -d Version=$v `
            -d BinaryPath="dist/djtoolkit.exe" `
            -d FpcalcPath="dist/fpcalc.exe" `
            -d SetupPath="dist/DJToolkit Setup.exe"
        shell: pwsh

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release tarballs
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${VERSION#v}"
          gh release download "${{ github.ref_name }}" \
            --pattern "djtoolkit-${VERSION}-arm64.tar.gz"

      - name: Generate formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM64=$(sha256sum "djtoolkit-${VERSION}-arm64.tar.gz" | cut -d' ' -f1)

          sed \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__SHA256_ARM64__/${SHA_ARM64}/g" \
            homebrew/Formula/djtoolkit.rb > djtoolkit.rb

          echo "--- Generated formula ---"
          cat djtoolkit.rb

      - name: Push to Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yenkz/homebrew-djtoolkit.git" tap
          mkdir -p tap/Formula
          cp djtoolkit.rb tap/Formula/djtoolkit.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/djtoolkit.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update djtoolkit to ${{ github.ref_name }}"
          git push
