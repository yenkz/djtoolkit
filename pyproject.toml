[tool.poetry]
name = "djtoolkit"
version = "0.1.0"
description = "DJ music library toolkit — download, fingerprint, tag, and manage tracks"
authors = []
packages = [{ include = "djtoolkit" }]

[tool.poetry.scripts]
djtoolkit = "djtoolkit.__main__:app"

[tool.poetry.dependencies]
python     = "^3.11"
typer      = { extras = ["all"], version = "^0.12" }
click      = ">=8.0.0,<8.2.0"
rich       = "^13.0"
httpx      = "^0.27"
mutagen    = "^1.47"
pyacoustid = "^1.3"
thefuzz    = "^0.22"
slskd-api  = "^0.2.1"
requests   = "^2.31"
fastapi    = "^0.111"
uvicorn    = { extras = ["standard"], version = "^0.30" }
spotipy    = "^2.24"
librosa    = "^0.10"
pyloudnorm = "^0.1"
Pillow     = "^10.0"
# essentia-tensorflow: optional TF genre/instrumental models (Linux/macOS x86_64, Python ≤3.11 only)
# Install manually: pip install essentia-tensorflow

[tool.poetry.group.dev.dependencies]
pytest       = "^8.0"
pytest-asyncio = "^0.23"
httpx        = "^0.27"   # for FastAPI TestClient

[build-system]
requires      = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = [
    "ignore::PendingDeprecationWarning:starlette",
    "ignore::DeprecationWarning:starlette",
    "ignore::DeprecationWarning:fastapi",
    "ignore::DeprecationWarning:pytest_asyncio",
]
