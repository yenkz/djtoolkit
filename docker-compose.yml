services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/yenkz/djtoolkit/djtoolkit-api:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env.service
    volumes:
      - ./cookies.txt:/opt/djtoolkit/cookies.txt
    depends_on:
      - pot-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  pot-server:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:4416:4416"
