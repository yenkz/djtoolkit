services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/yenkz/djtoolkit-api:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env.service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
